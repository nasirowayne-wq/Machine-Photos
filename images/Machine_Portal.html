<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Portal</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --surface: #11141d; --accent: #fbc531; --text: #ffffff; --border: rgba(255,255,255,0.08); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        header { position: sticky; top: 0; background: rgba(17,20,29,0.9); backdrop-filter: blur(15px); padding: 20px; border-bottom: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-between; }
        .brand { font-weight: 800; font-size: 20px; } .brand span { color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 10px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .folder-icon { height: 80px; display: flex; align-items: center; justify-content: center; background: rgba(251,197,49,0.05); border-radius: 12px; color: var(--accent); }
        .img-box { width: 100%; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .label { margin-top: 10px; font-size: 12px; text-align: center; overflow: hidden; text-overflow: ellipsis; }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #lb-img { max-width: 90%; max-height: 80%; border-radius: 10px; }
    </style>
</head>

        function render() {
            const grid = document.getElementById('gallery'); grid.innerHTML = "";
            rawData.filter(i => i.parent === currentPath).forEach(item => {
                const card = document.createElement('div'); card.className = "card";
                if(item.type === 'folder') {
                    card.innerHTML = '<div class="folder-icon"><i data-lucide="folder"></i></div><div class="label">'+item.name+'</div>';
                    card.onclick = () => { currentPath = item.path; render(); };
                } else {
                    card.innerHTML = '<div class="img-box"><img src="'+encodeURI(item.path)+'"></div><div class="label">'+item.name+'</div>';
                    card.onclick = () => { document.getElementById("lb-img").src=item.path; document.getElementById("lightbox").style.display="flex"; };

            });
            lucide.createIcons();
        }
