<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Equipment Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        .breadcrumb { font-size: 18px; color: #555; }
        .breadcrumb span { cursor: pointer; color: #007bff; font-weight: bold; text-decoration: none; }
        .breadcrumb span:hover { text-decoration: underline; }
        #search { padding: 10px 18px; border-radius: 25px; border: 1px solid #ccc; width: 280px; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .item { background: #fff; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.08); transition: 0.2s; border: 1px solid transparent; }
        .item:hover { transform: translateY(-4px); box-shadow: 0 6px 12px rgba(0,0,0,0.12); border-color: #007bff; }
        .item i { font-size: 55px; margin-bottom: 10px; }
        .fa-folder { color: #ffca28; }
        .item img { width: 100%; height: 130px; object-fit: cover; border-radius: 6px; background: #eee; }
        .item-name { font-size: 14px; margin-top: 10px; font-weight: 600; color: #444; overflow: hidden; text-overflow: ellipsis; }
        
        /* Lightbox - Full Screen View */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .toolbar { position: absolute; top: 20px; display: flex; gap: 30px; background: rgba(255,255,255,0.1); padding: 12px 30px; border-radius: 40px; backdrop-filter: blur(5px); }
        .tool-btn { color: white; cursor: pointer; font-size: 22px; transition: 0.2s; }
        .tool-btn:hover { color: #007bff; transform: scale(1.2); }
        #main-img { max-width: 90%; max-height: 80%; border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    </style>
</head>

        let currentFolder = "images";

        function render() {
            const container = document.getElementById('container');
            container.innerHTML = "";
            updateBC();

            // Find items where parent matches exactly
            const items = data.filter(i => i.parent === currentFolder);
            
            if(items.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; padding: 40px; color: #888;">This folder is empty.</div>';
            }

            items.forEach(item => {
                const el = document.createElement('div');
                el.className = "item";
                if(item.type === 'folder') {
                    el.innerHTML = '<i class="fas fa-folder"></i><div class="item-name">' + item.name + '</div>';
                    el.onclick = () => { currentFolder = item.path; render(); };
                } else {
                    el.innerHTML = '<img src="' + item.path + '" loading="lazy"><div class="item-name">' + item.name + '</div>';
                    el.onclick = () => openLB(item.path);
                }
                container.appendChild(el);
            });
        }

        function updateBC() {
            const bc = document.getElementById('bc');
            let parts = currentFolder.split('/');
            let html = '<span onclick="goHome()">Home</span>';
            let pathAcc = "images";
            for(let i=1; i<parts.length; i++) {
                pathAcc += "/" + parts[i];
                let target = pathAcc;
                html += ' / <span onclick="jumpTo(\''+target+'\')">' + parts[i] + '</span>';
            }
            bc.innerHTML = html;
        }

        function goHome() { currentFolder = "images"; render(); }
        function jumpTo(p) { currentFolder = p; render(); }

        function doSearch() {
            const term = document.getElementById('search').value.toLowerCase();
            if(!term) { render(); return; }
            const container = document.getElementById('container');
            container.innerHTML = "";
            data.filter(i => i.type === 'file' && i.name.toLowerCase().includes(term)).forEach(item => {
                const el = document.createElement('div');
                el.className = "item";
                el.innerHTML = '<img src="' + item.path + '"><div class="item-name">' + item.name + '</div>';
                el.onclick = () => openLB(item.path);
                container.appendChild(el);
            });
        }

        function openLB(src) {
            document.getElementById('main-img').src = src;
            document.getElementById('lightbox').style.display = "flex";
        }
        function closeLB() { document.getElementById('lightbox').style.display = "none"; }
        
        function downloadImg() {
            const src = document.getElementById('main-img').src;
            const a = document.createElement('a');
            a.href = src;
            a.download = src.split('/').pop();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function shareImg() {
            const dummy = document.createElement('input');
            document.body.appendChild(dummy);
            dummy.value = window.location.href;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            alert("Link copied to clipboard!");
        }

        render();
    </script>
