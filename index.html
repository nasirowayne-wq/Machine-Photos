    <style>
        :root { --accent: #22d3ee; --bg: #020617; --card: #0f172a; --border: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-top: 10px; }
        .item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .img-box { width: 100%; height: 110px; background: #000; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .item-name { padding: 8px; font-size: 11px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Fullscreen Photo Viewer */
        #viewer { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        .v-header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: rgba(15,23,42,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .v-btn { background: none; border: none; color: #fff; font-size: 20px; padding: 10px; }
        .v-content { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #v-img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
