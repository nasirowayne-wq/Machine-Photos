<head>
    <meta charset="UTF-8">

    <title>Equipment Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .breadcrumb { text-align: left; margin-bottom: 20px; font-size: 18px; color: #64748b; }
        .breadcrumb span { cursor: pointer; color: var(--primary); font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        /* Folder & File Cards */
        .item { background: var(--card); border-radius: 10px; padding: 15px; text-align: center; 
                box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 1px solid #e2e8f0; }
        .item:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .item i { font-size: 50px; margin-bottom: 10px; }
        .folder-icon { color: #facc15; }
        .file-icon { color: #94a3b8; }
        .item img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
        .item-name { font-size: 14px; font-weight: 500; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Lightbox Overlay */
        #lightbox { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; }
        .lb-tools { position: absolute; top: 20px; right: 20px; display: flex; gap: 20px; }
        .lb-btn { color: white; font-size: 24px; cursor: pointer; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .lb-btn:hover { background: var(--primary); }
        #lb-img { max-width: 90%; max-height: 80%; border-radius: 5px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>

        function render() {
            const explorer = document.getElementById('explorer');
            const breadcrumb = document.getElementById('breadcrumb');
            explorer.innerHTML = "";
            
            // Build Breadcrumb
            breadcrumb.innerHTML = '<span onclick="navigateTo(\'images\')">Home</span>';
            let pathParts = currentPath.split('/').slice(1);
            let tempPath = "images";
            pathParts.forEach(p => {
                tempPath += "/" + p;
                let closurePath = tempPath;
                breadcrumb.innerHTML += ' / <span onclick="navigateTo(\''+closurePath+'\')">' + p + '</span>';
            });

            // Filter items for current folder
            const items = data.filter(d => {
                let parts = d.RelativePath.split('/');
                let parentPath = parts.slice(0, -1).join('/');
                return parentPath === currentPath;
            });

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "item";
                if(item.Type === "folder") {
                    div.innerHTML = '<i class="fas fa-folder folder-icon"></i><div class="item-name">' + item.Name + '</div>';
                    div.onclick = () => navigateTo(item.RelativePath);
                } else {
                    div.innerHTML = '<img src="' + item.RelativePath + '"><div class="item-name">' + item.Name + '</div>';
                    div.onclick = () => openLightbox(item.RelativePath);
                }
                explorer.appendChild(div);
            });
        }

        function navigateTo(path) { currentPath = path; render(); }

        function openLightbox(src) {
            document.getElementById('lb-img').src = src;
            document.getElementById('lb-dl').href = src;
            document.getElementById('lightbox').style.display = "flex";
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = "none"; }

        function shareImg() {
            const url = window.location.href.split('?')[0] + "?" + document.getElementById('lb-img').src;
            if (navigator.share) {
                navigator.share({ title: 'Machine Photo', url: window.location.href });
            } else {
                alert("Link copied to clipboard!");
                navigator.clipboard.writeText(window.location.href);
            }
        }

        render();
