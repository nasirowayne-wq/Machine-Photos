<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SUDHIR PHOTOS | GALLERY</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        :root { 
            --accent: #fbc531; 
            --accent-dim: rgba(251, 197, 49, 0.15);
            --bg: #05070a; 
            --card: #11141d; 
            --border: rgba(255, 255, 255, 0.08); 
            --text-dim: #94a3b8; 
            --glass: rgba(17, 20, 29, 0.9);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            background-image: radial-gradient(circle at top right, #1e222d, #05070a); 
        }

        header { 
            padding: calc(var(--safe-top) + 15px) 20px 15px; 
            border-bottom: 1px solid var(--border); 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }

        main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bottom) + 30px); }
        
        .search-container { padding: 15px 15px 5px 15px; }
        .search-bar { 
            width: 100%;
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 14px; 
            color: #fff; 
            font-size: 14px; 
            outline: none; 
        }

        .nav-controls {
            display: flex;
            gap: 10px;
            padding: 5px 15px 10px;
        }
        .nav-btn {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-btn:active { background: rgba(255,255,255,0.05); }
        .nav-btn i { color: var(--accent); }

        .action-toggle-container {
            padding: 0 15px 15px;
        }
        .multi-select-btn {
            width: 100%;
            background: #11141d;
            border: 1px solid rgba(251, 197, 49, 0.25);
            padding: 12px;
            border-radius: 14px;
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }
        .multi-select-btn span { color: var(--accent); }
        .multi-select-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        .multi-select-btn.active span { color: #000; }

        /* FOLDER GRID LAYOUT SPECIFICATION */
        .grid.folder-view {
            display: grid !important;
            grid-template-columns: repeat(2, 1fr) !important; /* 2 Columns on Mobile */
            gap: 10px !important;
            padding: 0 15px !important;
        }

        /* COMPACT PHOTO GRID LAYOUT SPECIFICATION */
        .grid.photo-view {
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important; /* Made smaller: 3 Columns on Mobile */
            gap: 8px !important;
            padding: 0 15px !important;
        }

        /* Desktop Adjustments (Wider than 768px) */
        @media (min-width: 768px) {
            .grid.folder-view {
                grid-template-columns: repeat(3, 1fr) !important; /* 3 Columns on Desktop for folders */
                gap: 15px !important;
            }
            .grid.photo-view {
                grid-template-columns: repeat(5, 1fr) !important; /* Made smaller: 5 Columns on Desktop */
                gap: 12px !important;
            }
            .nav-controls {
                max-width: 400px;
            }
        }
        
        .card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 14px; 
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            width: 100%;
            cursor: pointer;
        }
        .card:active { transform: scale(0.97); }

        /* Block look for folders in their beautiful grid matrix */
        .card-folder {
            padding: 20px 15px !important;
            display: flex;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            min-height: 120px !important;
            text-align: center;
            gap: 12px;
        }
        .card-folder i { color: var(--accent); margin: 0 !important; }
        .card-folder .label {
            font-size: 13px !important;
            font-weight: 700 !important;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Optimized Compact Photo Card Structure */
        .card-file {
            padding: 6px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 90px;
            border-radius: 10px;
        }
        .card-file .label {
            font-size: 9px; 
            font-weight: 700; 
            line-height: 1.2; 
            text-transform: uppercase;
            color: #fff;
            width: 100%;
            text-align: center;
            margin-top: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .img-box { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 7px; 
            overflow: hidden; 
            background: #000; 
            border: 1px solid var(--border);
            position: relative;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .square-checkbox {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.6);
            display: none; 
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.15s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        body.select-mode-active .card-file .square-checkbox {
            display: flex;
        }

        .card.selected {
            border-color: var(--accent);
            background: rgba(251, 197, 49, 0.04);
        }

        .card.selected .square-checkbox {
            background: var(--accent);
            border-color: var(--accent);
        }
        .card.selected .square-checkbox i {
            display: block !important;
        }

        .selection-tray {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 20px);
            left: 15px;
            right: 15px;
            background: rgba(251, 197, 49, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 14px 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 3000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            color: #000;
        }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .tray-txt { font-weight: 800; font-size: 13px; text-transform: uppercase; }
        .tray-btn {
            background: #05070a;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .overlay { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            z-index: 2200; 
            display: none; 
            flex-direction: column; 
            background-image: radial-gradient(circle at top right, #1e222d, #05070a);
        }
        .overlay-header { 
            padding: calc(var(--safe-top) + 10px) 15px 15px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            background: var(--card); 
        }
        
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #lb-img { max-width: 100%; max-height: 65%; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        .action-bar { display: flex; gap: 10px; margin-top: 25px; }
        .act-btn { 
            background: #1e222d; 
            border: 1px solid var(--border); 
            padding: 12px 20px; 
            border-radius: 12px; 
            color: var(--text-dim); 
            font-size: 11px; 
            font-weight: 800; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .act-btn.primary { color: var(--accent); }
    </style>
</head>

    <header>
        <div class="logo">SUDHIR<span>PRO</span></div>

    <main id="main-content">
        <div class="search-container">

        </div>

        <div class="nav-controls">

                <button class="act-btn primary" onclick="shareActiveImg()"><i data-lucide="share-2"></i>SHARE</button>
            </div>
        </div>
    </div>

        let currentPath = "images";
        let selectedFiles = new Set();
        let isSelectionMode = false;
        let isLightboxOpen = false;

        function getIcon(name) {
            const n = name.toLowerCase();
            if (n.includes('gen')) return 'zap';
            if (n.includes('lift') || n.includes('man')) return 'arrow-up-circle';
            return 'folder';
        }

        function toggleSelectionMode() {
            isSelectionMode = !isSelectionMode;
            const btn = document.getElementById('select-mode-toggle');
            if(isSelectionMode) {
                btn.innerHTML = '<i data-lucide="x"></i> CANCEL MULTI-SELECTION MODE';
                btn.classList.add('active');
                document.body.classList.add('select-mode-active');
            } else {
                btn.innerHTML = '<i data-lucide="copy-check"></i> SELECT MULTIPLE PHOTOS TO <span>SHARE</span>';
                btn.classList.remove('active');
                document.body.classList.remove('select-mode-active');
                clearSelections();
            }
            if(window.lucide) lucide.createIcons();
        }

        function handleCardClick(item, cardItem) {
            if (item.type === 'folder') {
                if(isSelectionMode) return;
                window.location.hash = encodeURIComponent(item.path);
                return;
            }

            if (isSelectionMode) {
                if (selectedFiles.has(item.path)) {
                    selectedFiles.delete(item.path);
                    cardItem.classList.remove('selected');
                } else {
                    selectedFiles.add(item.path);
                    cardItem.classList.add('selected');
                }
                updateTray();
            } else {
                openLB(item.path, item.name);
            }
        }

        function parseAndRouteLocation() {
            const hashValue = window.location.hash.replace('#', '');
            
            if (hashValue.endsWith('__lightbox')) {
                isLightboxOpen = true;
                return;
            }
            
            if (isLightboxOpen && !hashValue.endsWith('__lightbox')) {
                isLightboxOpen = false;
                document.getElementById('lightbox').style.display = 'none';
            }

            const cleanPath = decodeURIComponent(hashValue.replace('__lightbox', ''));
            currentPath = (!cleanPath || cleanPath === "images") ? "images" : cleanPath;
            
            render();
            document.getElementById('main-content').scrollTop = 0;
        }

        window.addEventListener('hashchange', parseAndRouteLocation);

        function updateTray() {
            const tray = document.getElementById('selection-tray');
            const countLabel = document.getElementById('tray-count');
            if (selectedFiles.size > 0) {
                countLabel.innerText = selectedFiles.size + " File" + (selectedFiles.size > 1 ? "s" : "") + " Selected";
                tray.style.display = 'flex';
            } else {
                tray.style.display = 'none';
            }
        }

        function clearSelections() {
            selectedFiles.clear();
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            updateTray();
        }

        function render(data = null) {
            const grid = document.getElementById('gallery');
            const toggleArea = document.getElementById('toggle-area');
            grid.innerHTML = "";
            
            const list = data || rawData.filter(i => i.parent === currentPath);

            if (!data && isSelectionMode) { toggleSelectionMode(); }

            const hasFiles = list.some(i => i.type === 'file');
            const hasFolders = list.some(i => i.type === 'folder');

            if (hasFolders) {
                grid.className = "grid folder-view";
                toggleArea.style.display = 'none'; 
            } else {
                grid.className = "grid photo-view";
                toggleArea.style.display = hasFiles ? 'block' : 'none';
            }

            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "card " + (item.type === 'folder' ? 'card-folder' : 'card-file');
                if(selectedFiles.has(item.path)) card.classList.add('selected');

                let innerHtml = '';

                if(item.type === 'folder') {
                    innerHtml += '<i data-lucide="' + getIcon(item.name) + '" size="28"></i>' +
                                 '<div class="label">' + item.name + '</div>';
                } else {
                    innerHtml += '<div class="img-box">' +
                                    '<img src="' + encodeURI(item.path) + '" loading="lazy">' +
                                    '<div class="square-checkbox">' +
                                        '<i data-lucide="check" size="10" style="color:#000;margin:0;display:none;"></i>' +
                                    '</div>' +
                                 '</div>' +
                                 '<div class="label">' + item.name + '</div>';
                }

                card.innerHTML = innerHtml;
                card.onclick = () => handleCardClick(item, card);
                grid.appendChild(card);
            });
            if(window.lucide) lucide.createIcons();
        }

        function doSearch() {
            const val = document.getElementById('q').value.toLowerCase();
            if(val.length > 1) {
                render(rawData.filter(i => i.name.toLowerCase().includes(val) && i.type === 'file'));
            } else { render(); }
        }

        function openLB(src, name) {
            isLightboxOpen = true;
            window.location.hash = encodeURIComponent(currentPath) + '__lightbox';
            
            const lb = document.getElementById('lightbox');
            document.getElementById('lb-img').src = src;
            document.getElementById('lb-title').innerText = name.toUpperCase();
            lb.style.display = 'flex';
            
            document.getElementById('dl-btn').onclick = () => {
                const a = document.createElement('a');
                a.href = src;
                a.download = name + ".jpg";
                a.click();
            };
        }

        function closeLB() {
            if (window.location.hash.includes('__lightbox')) {
                history.back();
            }
        }

        async function shareActiveImg() {
            const imgPath = document.getElementById('lb-img').src;
            try {
                const response = await fetch(imgPath);
                const blob = await response.blob();
                const file = new File([blob], 'Sudhir-Photo.jpg', { type: blob.type });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: 'Sudhir Pro Photo' });
                }
            } catch (err) { console.error(err); }
        }

        async function shareSelectedImages() {
            if(selectedFiles.size === 0) return;
            const filesArray = [];
            try {
                for (let path of selectedFiles) {
                    const response = await fetch(encodeURI(path));
                    const blob = await response.blob();
                    const filename = path.split('/').pop() || 'photo.jpg';
                    const file = new File([blob], filename, { type: blob.type });
                    filesArray.push(file);
                }
                if (navigator.canShare && navigator.canShare({ files: filesArray })) {
                    await navigator.share({
                        files: filesArray,
                        title: 'Sudhir Pro Portfolio Share',
                        text: 'Shared items from machine database portal.'
                    });
                } else {
                    alert("Your browser or device context doesn't support sharing multiple files directly.");
                }
            } catch (err) { console.error("Sharing failed: ", err); }
        }

        function goHome() { window.location.hash = "images"; }
        
        function goBack() {
            if (isLightboxOpen) {
                closeLB();
                return;
            }
            if (currentPath !== "images") {
                const targetPath = currentPath.split('/').slice(0, -1).join('/') || "images";
                window.location.hash = encodeURIComponent(targetPath);
            }
        }

        parseAndRouteLocation();
    </script>
</body>
</html>
