<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>SUDHIR EQUIPMENT PHOTOS</title>
 <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
 <style>
 :root { --accent: #22d3ee; --bg: #1a1a2e; --card: #162447; --border: #1f4068; --text: #f8f8f8; }
 * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
 body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }

 header { 
 position: sticky; top: 0; background: rgba(21, 34, 71, 0.9); backdrop-filter: blur(5px);
 padding: 12px 16px; border-bottom: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-between; align-items: center;
 }
 .search-container { flex-grow: 1; position: relative; margin: 0 16px; }
 .search-bar { 
 width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; 
 padding: 10px 40px; color: var(--text); font-size: 14px; transition: border 0.3s;
 }
 .search-bar:focus { border-color: var(--accent); outline: none; }

 .nav-button { 
 background: none; border: none; color: var(--accent); font-size: 24px; /* Increased size */
 cursor: pointer; padding: 8px; display: flex; align-items: center; justify-content: center;
 }
 .nav-button:hover { color: var(--text); }

 .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; padding: 20px; }
 .card { 
 background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; 
 transition: transform 0.3s, box-shadow 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
 display: flex; flex-direction: column; align-items: center; cursor: pointer;
 }
 .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

 .img-box { 
 width: 100%; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; background: #000; 
 display: flex; justify-content: center; align-items: center;
 }
 .img-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
 
 .folder-content { 
 display: flex; flex-direction: column; align-items: center; color: var(--accent); 
 padding: 20px 0; width: 100%; /* Ensure it takes full width for centering */
 }
 .folder-icon-img { width: 50px; height: 50px; margin-bottom: 8px; } /* Style for the folder icon image */
 .label { 
 font-size: 14px; font-weight: 600; text-align: center; 
 white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; /* Ensure label respects card width */
 }

 #lightbox { 
 display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 1000; 
 flex-direction: column; align-items: center; justify-content: center; 
 }
 .lb-controls { 
 position: fixed; bottom: 30px; display: flex; gap: 15px; background: var(--card); 
 padding: 12px 20px; border-radius: 30px; border: 1px solid var(--border); 
 }
 .btn { 
 background: none; border: none; color: #fff; font-size: 12px; 
 display: flex; flex-direction: column; align-items: center; cursor: pointer;
 }
 .btn i { margin-bottom: 4px; } /* Space between icon and text */
 .btn:hover { color: var(--accent); }

 .footer { 
 display: flex; justify-content: space-around; padding: 15px; background: var(--card); 
 border-top: 1px solid var(--border); position: sticky; width: 100%; bottom: 0; 
 z-index: 10; /* Ensure footer stays above content */
 }
 .footer .nav-button { font-size: 16px; } /* Smaller nav buttons for footer */

 .branding { 
 text-align: center; 
 font-size: 20px; /* Slightly larger */
 font-weight: 700; 
 color: var(--text); 
 margin: 20px 0;
 padding: 0 16px; /* Add padding to prevent text overflow */
 }
 </style>
</head>
<body>
 <header>
 <div class="nav">
 <button class="nav-button" onclick="goBack()" aria-label="Go Back"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m11 17-5-4 5-4"></path><path d="a3 3 0 0 1 0 6"></path></svg></button>
 <button class="nav-button" onclick="goHome()" aria-label="Go Home"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-home"><path d="m10 3 10 10v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V13a2 2 0 0 1 2-2Z"></path><path d="M14 3v10"></path></svg></button>
 </div>
 <div class="search-container">
 <input type="text" id="searchInput" class="search-bar" placeholder="Search equipment..." oninput="search()">
 </div>
 </header>

 <div class="branding">Sudhir Equipment Photos</div>
 <div class="grid" id="content"></div>

 <div id="lightbox">
 <img id="lb-img" src="" alt="Lightbox Image">
 <div class="lb-controls">
 <button class="btn" onclick="closeLB()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>Close</button>
 <button class="btn" id="downloadBtn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-download"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 2v13"></path></svg>Save</button>
 <button class="btn" onclick="shareActive()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share-2"><circle cx="18" cy="12" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="12" cy="6" r="3"></circle><path d="M18 8.19V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v3.19"></path><path d="m8.7 11.7-3.1-3.1"></path><path d="m15.3 7.9-3.1 3.1"></path></svg>Share</button>
 </div>
 </div>

 <div class="footer">
 <button class="nav-button" onclick="goHome()">Home</button>
 <button class="nav-button" onclick="goBack()">Back</button>
 </div>

 <script>
 const data = ;
 let currentPath = "images"; // Start in the images folder
 const repoBaseUrl = ""; // Relative path from index.html to repo root (empty if index.html is at root)

 // --- Icon Mapping ---
 // Keys should be lowercase folder names.
 // Values should be relative paths to the SVG icons within the 'icons' folder.
 const folderIcons = {
 "spidercrane": "icons/spidercrane.svg", 
 "aircompressor": "icons/aircompressor.svg",
 // Add more folder names and their corresponding icon paths here
 // e.g., "excavator": "icons/excavator.svg",
 };
 const defaultFolderIcon = "icons/default_folder.svg"; // Path to a generic folder icon

 function render(items = null) {
 const container = document.getElementById('content');
 container.innerHTML = ""; // Clear current content
 
 // Filter items based on the current path
 // If items argument is provided (e.g., from search), use that list. Otherwise filter data.
 const listToRender = items || data.filter(i => i.parent === currentPath);
 
 if (listToRender.length === 0) {
 container.innerHTML = "<p style='text-align: center; grid-column: 1/-1;'>No items found in this folder.</p>";
 return;
 }

 listToRender.forEach(item => {
 const div = document.createElement('div');
 div.className = "card";

 if (item.type === 'folder') {
 // Determine the icon source
 const iconFileName = item.name.toLowerCase();
 const iconSrc = folderIcons[iconFileName] || defaultFolderIcon;

 div.innerHTML = 
 <div class="folder-content">
 <img src="" alt=" Icon" class="folder-icon-img">
 <div class="label"></div>
 </div>
 ;
 // Set click handler to navigate into the folder
 div.onclick = () => { 
 currentPath = item.path; 
 render(); // Re-render with the new path
 };
 } else { // It's a file (image)
 // Construct the full URL for the image
 const imageSrc = ${repoBaseUrl}; 
 div.innerHTML = 
 <div class="img-box">
 <img src="" alt="">
 </div>
 <div class="label"></div>
 ;
 // Set click handler to open the lightbox
 div.onclick = () => openLB(imageSrc);
 }
 container.appendChild(div);
 });
 // Re-initialize icons if needed (though we are using inline SVGs now)
 // lucide.createIcons(); 
 }

 function search() {
 const term = document.getElementById('searchInput').value.toLowerCase().trim();
 if (term.length > 0) {
 // Filter for files that match the search term
 const filtered = data.filter(i => i.type === 'file' && i.name.toLowerCase().includes(term));
 render(filtered); // Render only the filtered search results
 } else {
 render(); // If search term is empty, show the current folder contents
 }
 }

 function openLB(src) {
 const lbImg = document.getElementById('lb-img');
 lbImg.src = src;
 lbImg.alt = src.split('/').pop(); // Set alt text to filename
 document.getElementById('lightbox').style.display = 'flex';
 
 // Set download button functionality
 document.getElementById('downloadBtn').onclick = () => {
 const a = document.createElement('a'); 
 a.href = src; 
 a.download = src.split('/').pop(); // Suggest filename based on URL
 a.click();
 };
 }

 function closeLB() { 
 document.getElementById('lightbox').style.display = 'none'; 
 document.getElementById('lb-img').src = ""; // Clear src to prevent showing previous image briefly
 }

 function goHome() { 
 currentPath = "images"; // Reset path to the root 'images' folder
 render(); 
 }

 function goBack() { 
 if (currentPath !== "images") { 
 // Traverse up one directory level
 const pathParts = currentPath.split('/');
 pathParts.pop(); // Remove the last part
 currentPath = pathParts.join('/');
 if (currentPath === "") { currentPath = "images"; } // Ensure we don't go above 'images'
 render(); 
 } 
 }

 async function shareActive() {
 const imgElement = document.getElementById('lb-img');
 const src = imgElement.src;
 if (!src) return;

 try {
 // Fetch the image as a Blob
 const response = await fetch(src);
 const blob = await response.blob();
 const filename = src.split('/').pop();
 const file = new File([blob], filename, { type: blob.type });

 // Check if the Web Share API is available and supported
 if (navigator.canShare && navigator.canShare({ files: [file] })) {
 await navigator.share({
 files: [file],
 title: filename, // Optional title for the share
 text: Check out this equipment photo:  // Optional text
 });
 } else {
 // Fallback for browsers that don't support sharing files
 alert("Sharing via this device is not supported. You can use the 'Save' button to download the image and share it manually.");
 }
 } catch (error) {
 console.error("Error sharing:", error);
 alert("An error occurred while trying to share the image.");
 }
 }

 // Initial render when the page loads
 document.addEventListener('DOMContentLoaded', () => {
 render();
 });
 </script>
</body>
</html>
