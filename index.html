<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUDHIR PORTAL</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1020;
  --panel:rgba(17,24,39,.82);
  --card:#121a2d;
  --card2:#0f172a;
  --line:rgba(255,255,255,.08);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#38bdf8;
  --accent2:#22c55e;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(56,189,248,.16), transparent 28%),
    radial-gradient(circle at top right, rgba(34,197,94,.12), transparent 24%),
    linear-gradient(180deg,#08101f 0%, #0b1020 100%);
  color:var(--text);
  min-height:100vh;
}
header{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--panel);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
  padding:14px 16px 16px;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:800;
  letter-spacing:.8px;
}
.brand-badge{
  width:38px;
  height:38px;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  color:#fff;
  box-shadow:0 12px 30px rgba(56,189,248,.18);
}
.actions{
  display:flex;
  gap:8px;
}
.icon-btn{
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:var(--text);
  width:40px;
  height:40px;
  border-radius:12px;
  display:grid;
  place-items:center;
  cursor:pointer;
}
.search-wrap{
  position:relative;
}
.search{
  width:100%;
  padding:14px 16px 14px 46px;
  border-radius:14px;
  border:1px solid var(--line);
  background:rgba(10,15,30,.9);
  color:var(--text);
  outline:none;
  font-size:14px;
}
.search::placeholder{color:var(--muted)}
.search-icon{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:var(--accent);
}
.pathbar{
  margin-top:10px;
  color:var(--muted);
  font-size:12px;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}
.container{
  padding:18px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:16px;
}
.stat{
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
}
.stat .k{font-size:11px;color:var(--muted);margin-bottom:5px}
.stat .v{font-size:18px;font-weight:800}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;
}
.card{
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.18s ease;
  box-shadow:0 12px 30px rgba(0,0,0,.18);
}
.card:hover{transform:translateY(-3px);border-color:rgba(56,189,248,.35)}
.thumb{
  aspect-ratio:1/1;
  background:linear-gradient(135deg,#111827,#0b1220);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:6px 8px;
  border-radius:999px;
  font-size:11px;
  background:rgba(15,23,42,.72);
  border:1px solid var(--line);
  backdrop-filter:blur(10px);
}
.meta{
  padding:10px 10px 12px;
}
.name{
  font-size:12px;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.sub{
  margin-top:4px;
  font-size:11px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.empty{
  grid-column:1/-1;
  text-align:center;
  color:var(--muted);
  padding:40px 10px;
  border:1px dashed var(--line);
  border-radius:18px;
  background:rgba(255,255,255,.02);
}
@media (max-width:640px){
  .stats{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="brand">
      <div class="brand-badge"><i data-lucide="image"></i></div>
      <div>
        <div style="font-size:15px;">SUDHIR PORTAL</div>
        <div style="font-size:11px;color:var(--muted);font-weight:500;">Machine Photos Gallery</div>
      </div>
    </div>
    <div class="actions">
      <button class="icon-btn" onclick="goBack()" title="Back"><i data-lucide="chevron-left"></i></button>
      <button class="icon-btn" onclick="goHome()" title="Home"><i data-lucide="home"></i></button>
    </div>
  </div>

  <div class="search-wrap">
    <i data-lucide="search" class="search-icon"></i>
    <input id="searchInput" class="search" placeholder="Search file names..." oninput="searchItems()">
  </div>

  <div class="pathbar" id="pathBar">images</div>
</header>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="k">Current Folder</div><div class="v" id="folderCount">0</div></div>
    <div class="stat"><div class="k">Files</div><div class="v" id="fileCount">0</div></div>
    <div class="stat"><div class="k">Folders</div><div class="v" id="subCount">0</div></div>
  </div>

  <div id="content" class="grid"></div>
</div>

<script>
const data = $jsonData;
let currentPath = "images";

function childrenOf(path){
  return data.filter(i => i.parent === path);
}

function updateStats(list){
  document.getElementById("folderCount").textContent = currentPath;
  document.getElementById("fileCount").textContent = list.filter(i => i.type === "file").length;
  document.getElementById("subCount").textContent = list.filter(i => i.type === "folder").length;
}

function updatePathBar(){
  document.getElementById("pathBar").textContent = currentPath;
}

function render(list = null){
  const box = document.getElementById("content");
  box.innerHTML = "";

  const items = list || childrenOf(currentPath);
  updateStats(items);
  updatePathBar();

  if(!items.length){
    box.innerHTML = '<div class="empty">No items found in this folder.</div>';
    lucide.createIcons();
    return;
  }

  items.sort((a,b) => {
    if(a.type !== b.type) return a.type === "folder" ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    if(item.type === "folder"){
      div.innerHTML = `
        <div class="thumb">
          <span class="badge"><i data-lucide="folder"></i> Folder</span>
          <i data-lucide="folder" style="width:48px;height:48px;color:var(--accent)"></i>
        </div>
        <div class="meta">
          <div class="name">${item.name}</div>
          <div class="sub">Open folder</div>
        </div>`;
      div.onclick = () => { currentPath = item.path; document.getElementById("searchInput").value = ""; render(); };
    } else {
      const ext = item.name.split('.').pop().toLowerCase();
      div.innerHTML = `
        <div class="thumb">
          <span class="badge"><i data-lucide="file-image"></i> ${ext.toUpperCase()}</span>
          <img loading="lazy" src="${item.path}" alt="${item.name}">
        </div>
        <div class="meta">
          <div class="name">${item.name}</div>
          <div class="sub">Preview image</div>
        </div>`;
      div.onclick = () => window.open(item.path, "_blank");
    }

    box.appendChild(div);
  });

  lucide.createIcons();
}

function searchItems(){
  const term = document.getElementById("searchInput").value.toLowerCase().trim();
  if(!term){ render(); return; }
  const filtered = data.filter(i => i.type === "file" && i.name.toLowerCase().includes(term));
  render(filtered);
}

function goHome(){
  currentPath = "images";
  document.getElementById("searchInput").value = "";
  render();
}

function goBack(){
  if(currentPath === "images") return;
  const idx = currentPath.lastIndexOf("/");
  currentPath = idx > -1 ? currentPath.substring(0, idx) : "images";
  document.getElementById("searchInput").value = "";
  render();
}

render();
</script>
</body>
</html>
