<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUDHIR EQUIPMENT PHOTOS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #22d3ee; --bg: #1a1a2e; --card: #162447; --border: #1f4068; --text: #f8f8f8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 80px; }

        header {
            position: sticky; top: 0; background: rgba(21, 34, 71, 0.9); backdrop-filter: blur(5px);
            padding: 12px 16px; border-bottom: 1px solid var(--border); z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .search-container { flex-grow: 1; position: relative; margin: 0 16px; }
        .search-bar {
            width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 40px; color: var(--text); font-size: 14px; transition: border 0.3s;
        }
        .search-bar:focus { border-color: var(--accent); outline: none; }

        .nav-button { background: none; border: none; color: var(--accent); font-size: 18px; cursor: pointer; display: flex; align-items: center; gap: 5px;}
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; padding: 20px; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px; transition: transform 0.2s; cursor: pointer; }
        .card:active { transform: scale(0.95); }

        .img-box { width: 100%; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; background: #000; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .folder-icon { display: flex; flex-direction: column; align-items: center; color: var(--accent); padding: 20px 0; }
        .label { font-size: 12px; font-weight: 600; text-align: center; margin-top: 8px; word-break: break-all; }

        #lightbox {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .lb-controls { position: fixed; bottom: 30px; display: flex; gap: 20px; background: var(--card); padding: 15px 25px; border-radius: 50px; border: 1px solid var(--border); }
        .btn { background: none; border: none; color: #fff; font-size: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }

        .footer { display: flex; justify-content: space-around; padding: 15px; background: var(--card); border-top: 1px solid var(--border); position: fixed; width: 100%; bottom: 0; z-index: 99; }
        .branding { text-align: center; font-size: 18px; font-weight: 800; color: var(--accent); margin: 20px 0; text-transform: uppercase; letter-spacing: 1px;}
    </style>
</head>
<body>
    <header>
        <button class="nav-button" onclick="goBack()"><i data-lucide="chevron-left"></i></button>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search files..." oninput="search()">
        </div>
        <button class="nav-button" onclick="goHome()"><i data-lucide="house"></i></button>
    </header>

    <div class="branding">Sudhir Equipment Photos</div>
    <div class="grid" id="content"></div>

    <div id="lightbox">
        <img id="lb-img" style="max-width: 95%; max-height: 80%; border-radius: 8px; object-fit: contain;">
        <div class="lb-controls">
            <button class="btn" onclick="closeLB()"><i data-lucide="x"></i>Exit</button>
            <button class="btn" id="downloadBtn"><i data-lucide="download"></i>Save</button>
            <button class="btn" onclick="shareActive()"><i data-lucide="share-2"></i>Share</button>
        </div>
    </div>

    <div class="footer">
        <button class="nav-button" onclick="goHome()"><i data-lucide="home"></i> Home</button>
        <button class="nav-button" onclick="goBack()"><i data-lucide="arrow-left"></i> Back</button>
    </div>

        let currentPath = "images";

        function render(items = null) {
            const container = document.getElementById('content');
            container.innerHTML = "";
            const list = items || data.filter(i => i.parent === currentPath);

            list.forEach(item => {
                const div = document.createElement('div');
                div.className = "card";

                if(item.type === 'folder') {
                    div.innerHTML = '<div class="folder-icon"><i data-lucide="folder-open" size="48"></i><div class="label">'+item.name+'</div></div>';
                    div.onclick = () => { currentPath = item.path; render(); window.scrollTo(0,0); };
                } else {
                    div.innerHTML = '<div class="img-box"><img src="'+encodeURI(item.path)+'" loading="lazy" onerror="this.src=\'data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;100&quot; height=&quot;100&quot; viewBox=&quot;0 0 100 100&quot;><rect width=&quot;100&quot; height=&quot;100&quot; fill=&quot;%23162447&quot;/><circle cx=&quot;50&quot; cy=&quot;50&quot; r=&quot;20&quot; fill=&quot;%2322d3ee&quot;/></svg>\'"></div><div class="label">'+item.name+'</div>';
                    div.onclick = () => openLB(item.path);
                }
                container.appendChild(div);
            });
            if (window.lucide) lucide.createIcons();
        }

        function search() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            if(term.length > 1) {
                const filtered = data.filter(i => i.name.toLowerCase().includes(term) && i.type === 'file');
                render(filtered);
            } else if (term.length === 0) {
                render();
            }
        }

        function openLB(src) {
            document.getElementById('lb-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('downloadBtn').onclick = () => {
                const a = document.createElement('a');
                a.href = src;
                a.download = src.split('/').pop();
                a.click();
            };
        }

        function closeLB() { document.getElementById('lightbox').style.display = 'none'; }
        function goHome() { currentPath = "images"; render(); }
        function goBack() {
            if(currentPath !== "images") {
                const parts = currentPath.split('/');
                parts.pop();
                currentPath = parts.join('/') || "images";
                render();
            }
        }

        async function shareActive() {
            try {
                const imgElement = document.getElementById('lb-img');
                const response = await fetch(imgElement.src);
                const blob = await response.blob();
                const file = new File([blob], 'equipment.jpg', { type: blob.type });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: 'Sudhir Equipment' });
                } else {
                    alert("Sharing not supported on this browser");
                }
            } catch (err) { console.error(err); }
        }

        render();
    </script>
