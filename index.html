<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SUDHIR PORTAL</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020617;
  --panel:rgba(15,23,42,.82);
  --card:rgba(15,23,42,.92);
  --line:rgba(148,163,184,.16);
  --text:#f8fafc;
  --muted:#94a3b8;
  --accent:#22d3ee;
  --accent2:#8b5cf6;
  --shadow:0 18px 40px rgba(0,0,0,.28);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(34,211,238,.16), transparent 25%),
    radial-gradient(circle at top right, rgba(139,92,246,.14), transparent 22%),
    linear-gradient(180deg,#020617 0%, #050816 100%);
  color:var(--text);
  min-height:100vh;
}
header{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--panel);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line);
  padding:14px 14px 16px;
}
.toprow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}
.brand-icon{
  width:42px;
  height:42px;
  border-radius:14px;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  box-shadow:0 12px 28px rgba(34,211,238,.18);
  flex:0 0 auto;
}
.brand-text{min-width:0}
.brand-title{font-size:15px;font-weight:800;letter-spacing:.8px;line-height:1.1}
.brand-sub{font-size:11px;color:var(--muted);margin-top:3px}
.nav{display:flex;gap:8px;flex:0 0 auto}
.btn{width:40px;height:40px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);display:grid;place-items:center;cursor:pointer;transition:.18s ease}
.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.08)}
.search-wrap{position:relative}
.search{width:100%;padding:14px 14px 14px 46px;border-radius:16px;border:1px solid var(--line);background:rgba(2,6,23,.9);color:var(--text);font-size:14px;outline:none}
.search::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--accent)}
.pathbar{margin-top:10px;font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.container{padding:16px;max-width:1500px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:var(--shadow)}
.stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.stat .v{font-size:19px;font-weight:800}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px}
.card{background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.2s ease;position:relative}
.card:hover{transform:translateY(-4px);border-color:rgba(34,211,238,.36)}
.thumb{aspect-ratio:1/1;background:linear-gradient(135deg,#0f172a,#111827);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s ease}
.card:hover .thumb img{transform:scale(1.05)}
.badge{position:absolute;top:10px;left:10px;padding:6px 9px;border-radius:999px;font-size:11px;display:flex;align-items:center;gap:5px;background:rgba(15,23,42,.72);border:1px solid var(--line);backdrop-filter:blur(10px)}
.meta{padding:11px 11px 13px}
.name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub{margin-top:4px;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:44px 14px;border:1px dashed var(--line);border-radius:20px;background:rgba(255,255,255,.02)}
@media (max-width:720px){.stats{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:420px){.grid{grid-template-columns:repeat(2,1fr)}.brand-title{font-size:14px}}
</style>
</head>
<body>

<header>
  <div class="toprow">
    <div class="brand">
      <div class="brand-icon"><i data-lucide="image"></i></div>
      <div class="brand-text">
        <div class="brand-title">SUDHIR PORTAL</div>
        <div class="brand-sub">Machine Photos Gallery</div>
      </div>
    </div>
    <div class="nav">
      <button class="btn" onclick="goBack()" title="Back"><i data-lucide="chevron-left"></i></button>
      <button class="btn" onclick="goHome()" title="Home"><i data-lucide="home"></i></button>
    </div>
  </div>

  <div class="search-wrap">
    <i data-lucide="search" class="search-icon"></i>
    <input id="searchInput" class="search" placeholder="Search file names..." oninput="searchItems()">
  </div>

  <div class="pathbar" id="pathBar">images</div>
</header>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="k">Current Folder</div><div class="v" id="folderCount">images</div></div>
    <div class="stat"><div class="k">Files</div><div class="v" id="fileCount">0</div></div>
    <div class="stat"><div class="k">Folders</div><div class="v" id="subCount">0</div></div>
  </div>

  <div id="content" class="grid"></div>
</div>

<script>
const data = $jsonData;
let currentPath = "images";

function childrenOf(path){
  return data.filter(i => i.parent === path);
}

function updateStats(list){
  document.getElementById("folderCount").textContent = currentPath;
  document.getElementById("fileCount").textContent = list.filter(i => i.type === "file").length;
  document.getElementById("subCount").textContent = list.filter(i => i.type === "folder").length;
}

function updatePathBar(){
  document.getElementById("pathBar").textContent = currentPath;
}

function render(list = null){
  const box = document.getElementById("content");
  box.innerHTML = "";

  const items = list || childrenOf(currentPath);
  updateStats(items);
  updatePathBar();

  if(!items.length){
    box.innerHTML = '<div class="empty">No items found in this folder.</div>';
    lucide.createIcons();
    return;
  }

  items.sort((a,b) => {
    if(a.type !== b.type) return a.type === "folder" ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    if(item.type === "folder"){
      div.innerHTML = `
        <div class="thumb">
          <span class="badge"><i data-lucide="folder"></i> Folder</span>
          <i data-lucide="folder" style="width:52px;height:52px;color:var(--accent)"></i>
        </div>
        <div class="meta">
          <div class="name">${item.name}</div>
          <div class="sub">Open folder</div>
        </div>`;
      div.onclick = () => {
        currentPath = item.path;
        document.getElementById("searchInput").value = "";
        render();
      };
    } else {
      const ext = item.name.split('.').pop().toUpperCase();
      div.innerHTML = `
        <div class="thumb">
          <span class="badge"><i data-lucide="file-image"></i> ${ext}</span>
          <img loading="lazy" src="${item.path}" alt="${item.name}">
        </div>
        <div class="meta">
          <div class="name">${item.name}</div>
          <div class="sub">Preview image</div>
        </div>`;
      div.onclick = () => window.open(item.path, "_blank");
    }

    box.appendChild(div);
  });

  lucide.createIcons();
}

function searchItems(){
  const term = document.getElementById("searchInput").value.toLowerCase().trim();
  if(!term){ render(); return; }
  const filtered = data.filter(i => i.name.toLowerCase().includes(term));
  render(filtered);
}

function goHome(){
  currentPath = "images";
  document.getElementById("searchInput").value = "";
  render();
}

function goBack(){
  if(currentPath === "images") return;
  const idx = currentPath.lastIndexOf("/");
  currentPath = idx > -1 ? currentPath.substring(0, idx) : "images";
  document.getElementById("searchInput").value = "";
  render();
}

render();
</script>
</body>
</html>
